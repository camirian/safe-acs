apiVersion: v1
kind: Service
metadata:
  name: safe-acs-edge-service
  namespace: mission-critical
  labels:
    app: safe-acs
    component: gateway
    tier: edge
spec:
  type: NodePort
  selector:
    app: safe-acs
    component: gateway
  ports:
    - name: api
      protocol: TCP
      port: 8000
      targetPort: 8000
      # Exposes the service permanently on the Orin Nano's physical network interface
      nodePort: 30080
